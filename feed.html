<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WNO - Vertical News Feed</title>
    <style>
        /* Base Reset & Background */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh; 
            background: linear-gradient(180deg, whitesmoke 0%, black 100%);
            background-attachment: fixed;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* Menu Section */
        .menu {
            align-items: center;
            display: flex;
            width: 95vw;
            height: 50px;
            border: 2px solid black;
            border-radius: 120px;
            margin-top: 20px;
            background: linear-gradient(180deg, whitesmoke 0%, #87CEFA 100%);
            flex-shrink: 0;
        }

        .logo {
            height: 40px;
            margin-left: 5px;
            border-radius: 22px; 
            border: 1px solid white;
        }

        .head {
            font-size: 14px;
            margin-left: 10px;
            color: black;
        }

        /* Navigation Buttons */
        .button-space {
            background: linear-gradient(180deg, whitesmoke 0%, #87CEFA 100%);
            margin-top: 15px;
            display: flex;
            width: 95vw;
            height: 40px;
            border-radius: 120px;
            justify-content: center;
            align-items: center;
            border: 2px solid black;
            flex-shrink: 0;
        }

        .button {
            height: 25px;
            width: 21vw;
            margin: 1vw;
            border-radius: 120px;
            background-color: black;
            color: white;
            border: 1px solid white;
            font-size: 10px;
            cursor: pointer;
        }

        /* News Feed Container */
        .news-feed-container {
            width: 95vw;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 50vh;
        }

        /* News Card Styling */
        .news-card {
            display: flex;
            background: white;
            border: 2px solid black;
            border-radius: 20px;
            padding: 10px;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .news-pic {
            width: 85px;
            height: 85px;
            border-radius: 15px;
            object-fit: cover;
            border: 1px solid #000;
            flex-shrink: 0;
        }

        .news-details {
            margin-left: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 85px;
            flex: 1;
        }

        .news-title {
            font-size: 13px;
            font-weight: bold;
            color: #000;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-more-btn {
            width: fit-content;
            padding: 5px 12px;
            background: linear-gradient(180deg, whitesmoke 0%, #87CEFA 100%);
            border: 1px solid black;
            border-radius: 50px;
            font-size: 10px;
            font-weight: bold;
            color: #003366;
            text-decoration: none;
            text-align: center;
        }

        /* Footer */
        .footer {
            width: 100vw;
            padding: 30px 0;
            text-align: center;
            color: white;
            font-size: 10px;
            margin-top: 40px;
        }

        #status-msg {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="menu">
        <img src="logo.png" class="logo">
        <h1 class="head">WORLD NEWS OFFICIALS</h1>
    </div>

    <div class="button-space">
        <a href="index.html"><button class="button">Home</button></a>
        <a href="about.html"><button class="button">About</button></a>
        <a href="policy.html"><button class="button">Policy</button></a>
        <a href="contact us.html"><button class="button">Contact Us</button></a> 
    </div>

    <div id="status-msg">Connecting to live feed...</div>

    <div id="newsFeed" class="news-feed-container">
        </div>

    <div class="footer">
        <p>POWERED BY MILOCORE | © 2026</p>
    </div>

    <script>
        async function loadNews() {
            const container = document.getElementById('newsFeed');
            const status = document.getElementById('status-msg');

            try {
                // Fetching your JSON files
                const [newsRes, linksRes] = await Promise.all([
                    fetch('news.json'),
                    fetch('links.json')
                ]);

                if (!newsRes.ok || !linksRes.ok) throw new Error("Data not found");

                const newsData = await newsRes.json();
                const linksData = await linksRes.json();

                status.style.display = 'none'; // Hide loading message
                container.innerHTML = ''; // Clear container

                newsData.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.style.animationDelay = (index * 0.1) + 's'; // Staggered entrance
                    
                    const newsLink = linksData[item.id] || '#';

                    card.innerHTML = `
                        <img src="${item.pic}" class="news-pic" alt="news" onerror="this.src='logo.png'">
                        <div class="news-details">
                            <div class="news-title">${item.title}</div>
                            <a href="${newsLink}" class="read-more-btn">Read More</a>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error("Load Error:", err);
                status.innerText = "Check your news.json and links.json files.";
                status.style.color = "#87CEFA";
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadNews);
    </script>

</body>
</html>
