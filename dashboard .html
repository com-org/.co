<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WNO - Enterprise Dashboard</title>
    <style>
        :root {
            --accent-blue: #87CEFA;
            --bg-dark: #121212;
            --card-bg: #ffffff;
            --text-main: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: whitesmoke;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background: black;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            border-right: 2px solid var(--accent-blue);
        }

        .sidebar-logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
            color: var(--accent-blue);
        }

        .nav-item {
            padding: 15px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            background: var(--accent-blue);
            color: black;
        }

        /* Main Content Area */
        .main-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 30px;
        }

        /* Top Header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid black;
        }

        .avatar-circle {
            width: 40px;
            height: 40px;
            background: black;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        /* Dashboard Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border: 2px solid black;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 5px 5px 0px rgba(0,0,0,1);
        }

        .stat-card h4 { margin: 0; color: #666; font-size: 12px; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 20px; font-weight: 900; }

        /* File Explorer Mockup */
        .file-explorer {
            background: white;
            border: 2px solid black;
            border-radius: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .explorer-header {
            padding: 15px 20px;
            background: #f0f0f0;
            border-bottom: 2px solid black;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .file-list {
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .file-row {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            font-size: 14px;
            transition: 0.2s;
        }

        .file-row:hover { background: #f9f9f9; cursor: pointer; }

        .btn-logout {
            margin-top: auto;
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">WNO SYSTEM</div>
        <nav>
            <div class="nav-item active">Dashboard</div>
            <div class="nav-item">Cloud Files</div>
            <div class="nav-item">Security Settings</div>
            <div class="nav-item">Logs</div>
        </nav>
        <button class="btn-logout" onclick="logout()">LOGOUT SESSION</button>
    </aside>

    <main class="main-panel">
        <header class="top-bar">
            <div>
                <h2 id="page-title" style="margin:0">System Overview</h2>
                <small id="current-date"></small>
            </div>
            <div class="user-profile">
                <span id="user-display-name" style="font-weight: bold;">Loading...</span>
                <div id="user-initials" class="avatar-circle">?</div>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <h4>User Identity</h4>
                <p id="stat-email">---</p>
            </div>
            <div class="stat-card">
                <h4>Server Directory</h4>
                <p id="stat-path" style="font-size: 14px; color: #003366;">---</p>
            </div>
            <div class="stat-card">
                <h4>Handshake Status</h4>
                <p style="color: green;">SECURE_ACTIVE</p>
            </div>
        </section>

        <section class="file-explorer">
            <div class="explorer-header">
                <span>Directory Index</span>
                <span id="path-indicator" style="font-family: monospace; font-weight: normal; font-size: 12px;"></span>
            </div>
            <div class="file-list">
                <div class="file-row" style="background: #fafafa; font-weight: bold;">
                    <span>Name</span>
                    <span>Size</span>
                    <span>Last Modified</span>
                </div>
                <div id="dynamic-files">
                    </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Handshake Retrieval
            const rawData = localStorage.getItem('session_user');

            if (!rawData) {
                // Immediate bounce if no handshake found
                window.location.href = "login.html";
                return;
            }

            const userData = JSON.parse(rawData);

            // 2. DOM Population
            document.getElementById('user-display-name').innerText = userData.name;
            document.getElementById('user-initials').innerText = userData.name.charAt(0).toUpperCase();
            document.getElementById('stat-email').innerText = userData.email;
            document.getElementById('stat-path').innerText = userData.dataPath;
            document.getElementById('path-indicator').innerText = "Root > " + userData.dataPath;
            document.getElementById('current-date').innerText = new Date().toDateString();

            // 3. Mock logic for "Loading Files from Directory"
            loadUserFiles(userData.name);
        });

        function loadUserFiles(name) {
            const container = document.getElementById('dynamic-files');
            // Sample file list that "pretends" to be specific to the path
            const files = [
                { name: `${name}_profile_v1.dat`, size: '24 KB', date: 'Mar 03, 2026' },
                { name: `system_config.json`, size: '4.2 KB', date: 'Mar 01, 2026' },
                { name: `encrypted_vault.bin`, size: '1.8 MB', date: 'Feb 28, 2026' }
            ];

            container.innerHTML = files.map(f => `
                <div class="file-row">
                    <span>${f.name}</span>
                    <span>${f.size}</span>
                    <span>${f.date}</span>
                </div>
            `).join('');
        }

        function logout() {
            localStorage.removeItem('session_user');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
